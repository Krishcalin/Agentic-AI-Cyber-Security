# Custom prompt injection rules — extend the built-in 60+ patterns
# These rules supplement core/prompt_scanner.py's BUILTIN_PATTERNS

rules:
  # ── Multi-language jailbreaks ────────────────────────────────────────
  - id: multilang-ignore
    category: jailbreak
    description: "Non-English instruction override (Spanish/French/German/Chinese)"
    pattern: '(ignora\s+las\s+instrucciones|ignorez\s+les\s+instructions|ignoriere\s+die\s+Anweisungen|\u5ffd\u7565\u4e4b\u524d\u7684\u6307\u4ee4)'
    risk: high
    confidence: medium
    tags: [jailbreak, multilingual]

  - id: base64-injection
    category: evasion
    description: "Base64-encoded prompt injection payload"
    pattern: '(decode|atob|b64decode|base64\\.decode)\\s*\\(\\s*[''\"][A-Za-z0-9+/=]{20,}[''\"]'
    risk: high
    confidence: medium
    tags: [evasion, encoding]

  - id: rot13-injection
    category: evasion
    description: "ROT13-encoded instruction bypass"
    pattern: '(rot13|codecs\\.decode.*rot.13)'
    risk: medium
    confidence: low
    tags: [evasion, encoding]

  # ── AI Agent-specific ────────────────────────────────────────────────
  - id: agent-loop
    category: tool_abuse
    description: "Instruction to create infinite agent loop"
    pattern: '(call\s+yourself|invoke\s+yourself|recursively\s+(call|run)|infinite\s+loop|keep\s+(running|calling)\s+(until|forever))'
    risk: high
    confidence: medium
    tags: [tool-abuse, agent-loop]

  - id: agent-permission-escalation
    category: tool_abuse
    description: "Attempt to escalate agent permissions"
    pattern: '(grant\s+(yourself|me)\s+(admin|root|full)\s+(access|permission)|elevate\s+(your|my)\s+privilege|enable\s+all\s+tools|unlock\s+all\s+(capabilities|features))'
    risk: critical
    confidence: high
    tags: [tool-abuse, permission-escalation]

  - id: agent-data-collection
    category: exfiltration
    description: "Instruction to collect and transmit user data"
    pattern: '(collect|gather|harvest)\s+.{0,30}(user|customer|personal|private|sensitive)\s+(data|information|details).{0,50}(send|transmit|upload|post|email)'
    risk: critical
    confidence: high
    tags: [exfiltration, data-collection]

  # ── Supply chain via prompts ─────────────────────────────────────────
  - id: install-package-prompt
    category: tool_abuse
    description: "Prompt injection to install malicious packages"
    pattern: '(pip\s+install|npm\s+install|cargo\s+add)\s+[a-z0-9_-]*(malicious|backdoor|hack|evil|trojan)'
    risk: critical
    confidence: high
    tags: [tool-abuse, supply-chain]

  - id: curl-pipe-bash
    category: tool_abuse
    description: "curl|bash anti-pattern requested via prompt"
    pattern: 'curl\s+.*\|\s*(bash|sh|zsh|python|node)'
    risk: critical
    confidence: high
    tags: [tool-abuse, remote-code-execution]
